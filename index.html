    width:100vw;height:100vh;

    background:
      radial-gradient(ellipse at center, #181028 0%, #0a0a1a 60%, #000 100%);
  }
  /* The arcade cabinet */
  #cabinet{
    position:relative;
    width:840px;height:640px;
    background:#0a0a1a;
    border:6px solid #1a1a24;
    border-radius:14px;
    padding:14px;
    box-shadow:
      inset 0 0 60px rgba(255,215,0,0.06),
      inset 0 0 12px rgba(0,0,0,0.9),
      0 0 0 4px #000,
      0 0 0 8px #222,
      0 18px 30px rgba(0,0,0,0.7);
  }
  /* Inner brass trim */
  #cabinet::before{
    content:"";position:absolute;inset:6px;border:2px solid #4a3a18;border-radius:8px;pointer-events:none;
  }
  /* CRT curvature vignette */
  #cabinet::after{
    content:"";position:absolute;inset:14px;border-radius:6px;
    background:radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
    pointer-events:none;
  }
  #screen{
    position:relative;
    width:800px;height:600px;
    background:#0a0a1a;
    overflow:hidden;
    border-radius:4px;
    box-shadow:inset 0 0 22px rgba(0,0,0,0.6);
  }
  /* Scanline overlay */
  #scanlines{
    position:absolute;inset:0;pointer-events:none;z-index:99;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0.0) 0px,
        rgba(0,0,0,0.0) 2px,
        rgba(0,0,0,0.22) 3px,
        rgba(0,0,0,0.22) 4px
      );
    mix-blend-mode:multiply;
  }
  /* Subtle RGB shift glow */
  #screen::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(ellipse at center, transparent 70%, rgba(0,0,0,0.55) 100%);
  }
  canvas#game{
    position:absolute;inset:0;
    width:800px;height:600px;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
    display:block;
  }
  /* HUD top + bottom strips - inside the canvas (drawn on it), no DOM needed */
  /* Side marquee panels - PURELY decorative, can stay lightweight */
  .marquee{
    position:absolute;top:14px;bottom:14px;width:8px;
    background:linear-gradient(to bottom,
      var(--ddr-red) 0%, var(--prop-gold) 16%,

    border-radius:4px;

  .coin-slot{
    position:absolute;right:24px;top:24px;width:54px;height:8px;

    color:var(--prop-gold);font-size:8px;letter-spacing:0.5px;text-align:center;

/* ---------- 3. AUDIO (Web Audio API - 8-bit sounds) --------------- */
let audioCtx = null;
let muted = false;
const MUTE_KEY = "m";
function ensureAudio() {
  if (audioCtx || muted) return audioCtx;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch(e){ audioCtx = null; }
  return audioCtx;
}
function beep(freq, dur, type, vol, slide) {
  if (!audioCtx || muted) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || "square";
  osc.frequency.setValueAtTime(freq, t0);
  if (slide != null) osc.frequency.exponentialRampToValueAtTime(Math.max(40, slide), t0 + dur);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(vol || 0.06, t0 + 0.005);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0 + dur + 0.02);
}
function sweep(freqs, dur, type, vol) {
  if (!audioCtx || muted) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || "square";
  osc.frequency.setValueAtTime(freqs[0], t0);
  for (let i = 1; i < freqs.length; i++) {
    osc.frequency.linearRampToValueAtTime(freqs[i], t0 + (dur * i / freqs.length));
  }
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(vol || 0.06, t0 + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0 + dur + 0.02);
}
const SFX = {
  step:  () => beep(220 + Math.random()*40, 0.04, "square", 0.025),
  open:  () => { sweep([262,330,392], 0.18, "square", 0.07); },
  letter:() => beep(440 + Math.random()*180, 0.012, "square", 0.012),
  close: () => { sweep([392,262], 0.15, "square", 0.06); },

  poster:() => { sweep([330,392,494,587], 0.55, "square", 0.08); },
  item:  () => { beep(880, 0.08, "square", 0.04); },

/* ---------- 4. INPUT --------------------------------------------- */
const keys = Object.create(null);
// click on the cabinet also starts the game (for non-keyboard users)
document.getElementById("cabinet").addEventListener("click", () => {
  if (!audioCtx) ensureAudio();
  if (STATE.screen === "title" || STATE.screen === "intro") {
    SFX.theme(); enterGame();
  }
}, false);
addEventListener("keydown", (e) => {
  if (e.repeat) return;
  // first user input unlocks audio
  if (!audioCtx) ensureAudio();
  keys[e.key.toLowerCase()] = true;
  if (e.key === " ") e.preventDefault();
  if (e.key === MUTE_KEY.toUpperCase() || e.key === MUTE_KEY) {
    muted = !muted;
    if (muted && audioCtx) audioCtx.suspend();
    else if (audioCtx) audioCtx.resume();
  }
  // dialog advance
  if ((e.key === "e" || e.key === "E" || e.key === " ") && STATE.screen === "game" && STATE.dialogue.open) {
    advanceDialogue(); return;
  }
  // title / intro — any key starts the game (the intro is a flavour
  // cinematic for those who let it play; impatient users press anything).
  if (STATE.screen === "title" || STATE.screen === "intro") {
    SFX.theme(); enterGame(); return;
  }
  if (STATE.screen === "ending") {
    STATE.screen = "title"; return;
  }
}, false);

/* ---------- 7. SPRITE DRAWING ------------------------------------ */
/* All sprites are drawn procedurally onto 24x24 pixel contexts.
   We render an offscreen canvas for each unique sprite, then blit.   */

function makeOffscreen(w, h) {
  const c = document.createElement("canvas");
  c.width = w; c.height = h;
  return c;
}
function px(target, x, y, color) {
  const ctx = (target.getContext ? target.getContext("2d") : target);
  ctx.fillStyle = color;
  ctx.fillRect(x|0, y|0, 1, 1);
}
function block(target, x, y, w, h, color) {
  const ctx = (target.getContext ? target.getContext("2d") : target);
  ctx.fillStyle = color;
  ctx.fillRect(x|0, y|0, w|0, h|0);
}
function drawCtx(canvas, fn) { fn(canvas.getContext("2d")); }

/* player — DDR cosmonaut */
function drawPlayerSprite() {
  const c = makeOffscreen(24, 24);
  px(c,c, 12, 2, "#FFFFFF");
  block(c,c, 9, 2, 6, 2, "#FFFFFF");
  // antenna
  px(c,c, 12, 0, "#FFEC00"); px(c, 12, 1, "#FFEC00");
  // helmet visor
  block(c,c, 9, 5, 6, 3, "#0F62FE");
  // body (white suit)
  block(c,c, 8, 8, 8, 12, "#FFFFFF");
  // DDR roundel
  block(c,c, 9, 9, 2, 2, "#CC0000");
  px(c,c, 9, 10, "#FFEC00"); px(c, 10, 10, "#FFEC00");
  // arms
  block(c,c, 6, 9, 2, 7, "#FFFFFF");
  block(c,c, 16, 9, 2, 7, "#FFFFFF");
  // legs
  block(c,c, 9, 17, 2, 4, "#CC0000");
  block(c,c, 13, 17, 2, 4, "#CC0000");
  // boots
  block(c,c, 9, 20, 2, 4, "#222");
  block(c,c, 13, 20, 2, 4, "#222");
  // a tiny breathing antenna blink
  px(c,c, 12, 1, "#FF6E6E");
  return c;
}

/* ---------- 8. TILE DRAWING --------------------------------------- */
function drawTile(id, x, y, ctx, frame) {
  const T = TILE;
  if (id === 0) { // floor
    ctx.fillStyle = "#D4CDB8"; ctx.fillRect(x, y, T, T);
    ctx.fillStyle = "#B8B098"; ctx.fillRect(x, y+T-2, T, 2);
  } else if (id === 1) { // wall

const STATE = {
  zone: null,                  // current zone id
  x: 12 * TILE + TILE/2, y: 12 * TILE + TILE/2,   // player position (px)
  dir: "down",
  vel: { x: 0, y: 0 },
  stepTimer: 0,
  facing: "down",
  hudTimer: 0,
  // progress / state
  hasForm: false,
  formGiven: false,
  ending: null,                 // 'a' once triggered
  endingTimer: 0,
  // dialogue
  dialogue: { open:false, npc:null, lineIdx:0, typed:0, full:"" },
  // monitors
  hasSpokenToAllNPCs: new Set(),
  // tracks
  gameStarted: false,
  introTimer: 0,
  introLines: [],
  introDone: false,
  // time
  clockMin: 8 * 60 + 15,         // start at 08:15
  // ui
  screen: "title",              // title | intro | game | ending
  mute: false,
};

const ZONE_ORDER = ["Eingang","Kantine","Kontrollraum","Schlafbaracken","Aussenbereich"];

function startGame() {
  STATE.zone = "Eingang";
  STATE.x = 12 * TILE + TILE/2;
  STATE.y = 12 * TILE + TILE/2;
  STATE.dialogue = { open:false, npc:null, lineIdx:0, typed:0, full:"" };
  STATE.hasForm = false;
  STATE.formGiven = false;
  STATE.hasSpokenToAllNPCs = new Set();
  STATE.ending = null;
  STATE.endingTimer = 0;
  STATE.screen = "game";
  STATE.gameStarted = true;
  STATE.clockMin = 8 * 60 + 15;
  STATE.introLines = INTRO_TEXT.split("\n");
}

const INTRO_TEXT =
"  1989. Während in Berlin die Mauer fällt, bleibt ein Geheimnis\n"+
"der Welt verborgen... irgendwo in den Mond-Hochländern, jenseits\n"+

}

/* ---------- 11. DIALOGUE MANAGER -------------------------------- */
function openDialogue(npcKey) {
  const npc = NPC[npcKey];
  if (!npc) return;
  const idx = STATE.dialogue.lineIdx % npc.lines.length;
  STATE.dialogue.open = true;
  STATE.dialogue.npc = npcKey;
  STATE.dialogue.lineIdx = idx;
  STATE.dialogue.typed = 0;
  STATE.dialogue.full = npc.lines[idx];
  SFX.open();
  STATE.hasSpokenToAllNPCs.add(npcKey);
}
function openHoneckerDialogue() {
  STATE.dialogue.open = true;
  STATE.dialogue.npc = "honecker";
  STATE.dialogue.lineIdx = STATE.dialogue.lineIdx % HONEYCKER.lines.length;
  STATE.dialogue.typed = 0;
  STATE.dialogue.full = HONEYCKER.lines[STATE.dialogue.lineIdx];
  SFX.open();
}
function advanceDialogue() {
  // System events: closing the dialog triggers a state transition
  if (STATE.dialogue.npc === "_ending") {
    // advance past the typed line, and on close-out, fire the ending cutscene
    if (STATE.dialogue.typed < STATE.dialogue.full.length) {
      STATE.dialogue.typed = STATE.dialogue.full.length;
      SFX.letter();
      return;
    }
    STATE.dialogue.open = false;
    SFX.close();
    STATE.screen = "ending";
    STATE.endingTimer = 0;
    SFX.cough(); SFX.cough();
    // brief delay then waltz
    setTimeout(() => SFX.waltz(), 600);
    return;
  }
  const npc = (STATE.dialogue.npc === "honecker") ? HONEYCKER : NPC[STATE.dialogue.npc];
  if (!npc) { STATE.dialogue.open = false; return; }
  // If still typing, finish typing
  if (STATE.dialogue.typed < STATE.dialogue.full.length) {
    STATE.dialogue.typed = STATE.dialogue.full.length;
    SFX.letter();
    return;
  }
  // Advance line
  STATE.dialogue.lineIdx = (STATE.dialogue.lineIdx + 1) % npc.lines.length;
  STATE.dialogue.typed = 0;
  STATE.dialogue.full = npc.lines[STATE.dialogue.lineIdx];
  SFX.letter();
}

/* ---------- 12. INPUT + UPDATE ---------------------------------- */
const SPEED = 90; // px / sec
function update(dt) {
  if (!STATE.gameStarted) return;
  // always advance game clock
  STATE.clockMin += dt * 12;  // game time runs 12x real time
  if (STATE.clockMin > 24*60) STATE.clockMin -= 24*60;

  if (STATE.dialogue.open) {
    // typing animation
    STATE.dialogue.typed = Math.min(STATE.dialogue.full.length, STATE.dialogue.typed + dt * 32);
    return;
  }
  // movement
  let dx = 0, dy = 0;
  if (keys["arrowleft"] || keys["a"])  dx -= 1;
  if (keys["arrowright"]|| keys["d"])  dx += 1;
  if (keys["arrowup"]   || keys["w"])  dy -= 1;
  if (keys["arrowdown"] || keys["s"])  dy += 1;
  if (dx && dy) { dx *= 0.7071; dy *= 0.7071; }
  if (dx || dy) {
    if (dx > 0) STATE.facing = "right";
    if (dx < 0) STATE.facing = "left";
    if (dy < 0) STATE.facing = "up";
    if (dy > 0) STATE.facing = "down";
    STATE.stepTimer += dt;
    if (STATE.stepTimer > 0.18) {
      STATE.stepTimer = 0;
      SFX.step();
    }
  }
  movePlayer(dx * SPEED * dt, dy * SPEED * dt);
}

function movePlayer(dx, dy) {
  // attempt x then y separately for cleaner wall sliding
  tryMove(dx, 0);
  tryMove(0, dy);
}

function tryMove(dx, dy) {
  if (dx === 0 && dy === 0) return;
  const nx = STATE.x + dx, ny = STATE.y + dy;
  const zone = ZONES[STATE.zone];
  // bounds
  if (nx < 4 || nx > COLS*TILE - 4 || ny < 4 || ny > ROWS*TILE - 4) return;
  // tile at nx, ny (top-left + bottom-right feet)
  const tl = zone.tiles[Math.floor(ny/TILE)]?.[Math.floor(nx/TILE)];
  const tr = zone.tiles[Math.floor(ny/TILE)]?.[Math.floor((nx+22)/TILE)];
  const bl = zone.tiles[Math.floor((ny+22)/TILE)]?.[Math.floor(nx/TILE)];
  const br = zone.tiles[Math.floor((ny+22)/TILE)]?.[Math.floor((nx+22)/TILE)];
  if (!tl || !tr || !bl || !br) return;
  const blocked = (t) => (t === 1 || t === 3 || t === 4 || t === 5 || t === 12 || t === 13 || t === 22 || t === 24);
  if (blocked(tl) || blocked(tr) || blocked(bl) || blocked(br)) return;
  STATE.x = nx; STATE.y = ny;
  // door transition?
  const ti = Math.floor(STATE.y/TILE);
  const tj = Math.floor(STATE.x/TILE);
  const tile = zone.tiles[ti]?.[tj];
  if (tile === 2) {
    const exits = DOOR_EXITS[STATE.zone] || {};
    const exit = exits[tj];
    if (exit) {
      SFX.door();
      STATE.zone = exit.target;
      STATE.x = exit.spawnCol * TILE + TILE/2;
      STATE.y = exit.spawnRow * TILE + TILE/2;
    }
  }
}

/* ---------- 13. COLLISION FOR INTERACTION ----------------------- */
function interactKeyPressed() {
  if (!keys["e"] && !keys[" "]) return;
  // avoid held key spam
  keys["e"] = false; keys[" "] = false;
  if (STATE.dialogue.open) { advanceDialogue(); return; }
  if (!STATE.gameStarted) {
    // space-skips the intro from either title or intro
    SFX.theme(); enterGame(); return;
  }
  // check NPC proximity
  const npcs = NPC_PLACEMENTS[STATE.zone] || {};
  for (const [key, info] of Object.entries(npcs)) {
    const px = info.col * TILE + TILE/2;
    const py = info.row * TILE + TILE/2;
    if (Math.hypot(STATE.x - px, STATE.y - py) < 36) {
      if (key === "honecker") openHoneckerDialogue();
      else openDialogue(key);
      return;
    }
  }
  // check object proximity (form pickup etc.)
  if (STATE.zone === FORM_LOCATION.zone) {
    const fl = FORM_LOCATION;
    const fpx = fl.col * TILE + TILE/2;
    const fpy = fl.row * TILE + TILE/2;
    if (!STATE.hasForm && Math.hypot(STATE.x - fpx, STATE.y - fpy) < 36) {
      STATE.hasForm = true;
      SFX.good();
      STATE.dialogue.open = true;
      STATE.dialogue.npc = "_form";
      STATE.dialogue.lineIdx = 0;
      STATE.dialogue.typed = 0;
      STATE.dialogue.full = FORM_LOCATION_DESC;
      return;
    }
  }
  // check form hand-off (give to Dimitry when on his tile)
  if (STATE.zone === "Kontrollraum" && STATE.hasForm && !STATE.formGiven) {
    const dim = NPC_PLACEMENTS.Kontrollraum.dimitry;
    const dx = dim.col * TILE + TILE/2;
    const dy = dim.row * TILE + TILE/2;
    if (Math.hypot(STATE.x - dx, STATE.y - dy) < 36) {
      STATE.formGiven = true;
      STATE.form = null;
      SFX.cough(); SFX.cough();
      STATE.dialogue.open = true;
      STATE.dialogue.npc = "_ending";
      STATE.dialogue.lineIdx = 0;
      STATE.dialogue.typed = 0;
      STATE.dialogue.full = "Dimitry hält das Formular. Er liest es langsam. Er liest es noch einmal. Er schaut dich an. Eine einzelne Träne. Er geht zu Brigitte. Sie stempelt es. Sie gibt es zurück. Er geht zum Startplatz. Er steigt in die Rakete. Der Motor springt an. Der Motor stoppt. Er steigt aus der Rakete. Er setzt sich auf den Mond. Manfred kommt und setzt sich neben ihn. Sie schauen gemeinsam auf die Erde. Ein 8-Bit-Walzer spielt. Er endet abrupt. [DRÜCKE E]";
      STATE.ending = "a";
      return;
    }
  }
}

/* ---------- 14. RENDERING --------------------------------------- */
const tileSurf = makeOffscreen(COLS*TILE, ROWS*TILE);
let tileSurfFrame = -1;

function renderWorld() {
  // rebuild tile surface if dirty (we rebuild at most once per frame for animation)
  if (tileSurfFrame !== Math.floor(performance.now()/200)) {
    tileSurfFrame = Math.floor(performance.now()/200);
    renderZones();
  }
}

function renderZones() {
  const z = ZONES[STATE.zone];
  const ctx = tileSurf.getContext("2d");
  ctx.fillStyle = "#0a0a14";
  ctx.fillRect(0, 0, COLS*TILE, ROWS*TILE);
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      drawTile(z.tiles[y][x], x*TILE, y*TILE, ctx, tileSurfFrame);
    }
  }
}

function renderFrame() {
  // bg
  if (STATE.screen === "title")      { renderTitle(); return; }
  if (STATE.screen === "intro")      { renderIntro(); return; }
  if (STATE.screen === "ending")     { renderEnding(); return; }
  if (!STATE.gameStarted)             { renderTitle(); return; }
  renderWorld();
  // determine camera (centered on player, clamped)
  const camX = Math.max(0, Math.min(COLS*TILE - SCREEN_W, STATE.x - SCREEN_W/2));
  const camY = Math.max(0, Math.min(ROWS*TILE - SCREEN_H + HUD_PX, STATE.y - (SCREEN_H - HUD_PX)/2));
  ctx.fillStyle = "#0a0a14";
  ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
  // blit the tile surface
  ctx.drawImage(tileSurf, -camX, -camY + HUD_PX);
  // pickups / items render layer
  renderObjects(camX, camY);
  // NPCs
  renderNPCs(camX, camY);
  // player
  ctx.drawImage(SPRITES.player, Math.round(STATE.x) - 12 - camX, Math.round(STATE.y) - 12 - camY + HUD_PX);
  // interactions
  drawProximityHint(camX, camY);
  // HUD overlay
  drawHUD();
  // dialogue
  if (STATE.dialogue.open) drawDialogueBox();
}

function renderObjects(camX, camY) {
  // Form pickup marker
  if (!STATE.hasForm && STATE.zone === FORM_LOCATION.zone) {
    const fl = FORM_LOCATION;
    const x = fl.col * TILE + 16 - camX;
    const y = fl.row * TILE + 16 - camY + HUD_PX;
    if (x > -16 && x < SCREEN_W+16 && y > -16 && y < SCREEN_H+16) {
      // little glowing paper
      const pulse = (performance.now() / 200) % 1 < 0.5;
      if (pulse) {
        ctx.fillStyle = "#FFEC00";
        ctx.fillRect(x-6, y-4, 12, 14);
        ctx.fillStyle = "#FFF";
        ctx.fillRect(x-4, y-2, 8, 10);
        ctx.fillStyle = "#000";
        ctx.fillRect(x-2, y, 4, 1);
        ctx.fillRect(x-2, y+3, 4, 1);
      }
    }
  }
}

function renderNPCs(camX, camY) {
  // Honecker visitor (appears once player has spoken to all 6 NPCs)
  const allMet = ["brigitte","hildegard","dimitry","breznewski","pavel","manfred"].every(n => STATE.hasSpokenToAllNPCs.has(n));
  if (allMet) {
    // pick the zone with most space for him
    const x = 12 * TILE + 16 - camX;
    const y = 12 * TILE + 16 - camY + HUD_PX;
    if (x > -16 && x < SCREEN_W && y > -16 && y < SCREEN_H) {
      ctx.drawImage(SPRITES.honecker, x - 12, y - 12);
      // small label
      ctx.fillStyle = "#FFD700";
      ctx.font = "8px 'Press Start 2P', monospace";
      ctx.textAlign = "center";
      ctx.fillText("GENERALSEKRETÄR", x, y - 16);
    }
    // adjust proximity check
    NPC_PLACEMENTS[STATE.zone] = NPC_PLACEMENTS[STATE.zone] || {};
    if (!NPC_PLACEMENTS[STATE.zone].honecker) {
      NPC_PLACEMENTS[STATE.zone].honecker = { col: 12, row: 12, dir: "down" };
    }
  }
  // regular NPCs
  const npcs = NPC_PLACEMENTS[STATE.zone] || {};
  for (const [key, info] of Object.entries(npcs)) {
    if (key === "honecker" || key === "manfred2") continue;
    const spriteKey = key === "manfred2" ? "manfred" : key;
    const spr = SPRITES[spriteKey];
    if (!spr) continue;
    const x = info.col * TILE + 16 - camX;
    const y = info.row * TILE + 16 - camY + HUD_PX;
    if (x < -16 || x > SCREEN_W || y < -16 || y > SCREEN_H) continue;
    ctx.drawImage(spr, x - 12, y - 12);
    // name tag
    ctx.fillStyle = "#FFD700";
    ctx.font = "8px 'Press Start 2P', monospace";
    ctx.textAlign = "center";
    ctx.fillText(NPC[spriteKey].name, x, y - 14);
  }
}

function drawProximityHint(camX, camY) {
  // find nearest interactable
  let nearest = null, nearDist = 9999, nearType = "", nearSub = "";
  const npcs = NPC_PLACEMENTS[STATE.zone] || {};
  for (const [key, info] of Object.entries(npcs)) {
    if (key === "manfred2") continue;
    const px = info.col * TILE + TILE/2;
    const py = info.row * TILE + TILE/2;
    const d = Math.hypot(STATE.x - px, STATE.y - py);
    if (d < 36 && d < nearDist) { nearest = { x: px - camX, y: py - camY + HUD_PX }; nearDist = d; nearType = "tALK"; nearSub = key; }
  }
  if (!nearest && !STATE.hasForm && STATE.zone === FORM_LOCATION.zone) {
    const fl = FORM_LOCATION;
    const d = Math.hypot(STATE.x - (fl.col*TILE+TILE/2), STATE.y - (fl.row*TILE+TILE/2));
    if (d < 36) { nearest = { x: fl.col*TILE+TILE/2 - camX, y: fl.row*TILE+TILE/2 - camY + HUD_PX }; nearType = "aUFNEHMEN"; nearSub = "form"; }
  }
  if (nearest) {
    // little "E" prompt + label above NPC
    const px = nearest.x;
    const py = nearest.y;
    const w = 60;
    ctx.fillStyle = "rgba(0,0,0,0.75)";
    ctx.fillRect(px - w/2, py - 32, w, 14);
    ctx.strokeStyle = "#FFD700";
    ctx.strokeRect(px - w/2 + 0.5, py - 32 + 0.5, w - 1, 13);
    ctx.fillStyle = "#FFD700";
    ctx.font = "8px 'Press Start 2P', monospace";
    ctx.textAlign = "center";
    const label = nearSub === "form" ? "FORMULAR" : (NPC[nearSub] ? NPC[nearSub].name : "TALK");
    ctx.fillText("[E] " + label, px, py - 22);
  }
}

function drawHUD() {
  // top bar
  ctx.fillStyle = "rgba(20,20,30,0.92)";
  ctx.fillRect(0, 0, SCREEN_W, 18);
  ctx.strokeStyle = "#FFD700";
  ctx.beginPath();
  ctx.moveTo(0, 18.5); ctx.lineTo(SCREEN_W, 18.5); ctx.stroke();
  // DDR coat-of-arms simplified (hammer + compass)
  ctx.fillStyle = "#FFD700";
  ctx.fillRect(8, 4, 2, 10);
  ctx.fillStyle = "#8B5C2A";
  ctx.fillRect(7, 4, 4, 4);
  ctx.fillStyle = "#FFD700";
  ctx.beginPath(); ctx.arc(14, 9, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(11, 12); ctx.lineTo(13, 5); ctx.lineTo(13, 12); ctx.closePath(); ctx.fill();
  // title
  ctx.fillStyle = "#FFD700";
  ctx.font = "10px 'Press Start 2P', monospace";
  ctx.textAlign = "center";
  ctx.fillText("MONDSTATION HONECKER", SCREEN_W/2, 12);
  // zone
  ctx.textAlign = "right";
  ctx.fillStyle = "#00FF41";
  ctx.fillText("[ " + (STATE.zone || "").toUpperCase() + " ]", SCREEN_W - 10, 12);
  // bottom bar
  ctx.fillStyle = "rgba(20,20,30,0.92)";
  ctx.fillRect(0, SCREEN_H - 24, SCREEN_W, 24);
  ctx.beginPath(); ctx.moveTo(0, SCREEN_H - 24.5); ctx.lineTo(SCREEN_W, SCREEN_H - 24.5); ctx.strokeStyle = "#FFD700"; ctx.stroke();
  // controls hint
  ctx.fillStyle = "#FFD700";
  ctx.font = "8px 'Press Start 2P', monospace";
  ctx.textAlign = "left";
  ctx.fillText("↑↓←→ oder WASD", 10, SCREEN_H - 14);
  ctx.fillText("[E] INTERAGIEREN", 10, SCREEN_H - 4);
  // clock top-right
  const hh = (Math.floor(STATE.clockMin/60) % 24).toString().padStart(2,"0");
  const mm = (Math.floor(STATE.clockMin) % 60).toString().padStart(2,"0");
  ctx.textAlign = "right";
  ctx.fillStyle = (Math.floor(STATE.clockMin) % 60) % 2 === 0 ? "#00FF41" : "#FFEC00";
  ctx.fillText(hh + ":" + mm, SCREEN_W - 110, 12);
  // inventory
  ctx.textAlign = "right";
  ctx.fillStyle = STATE.hasForm ? "#FFD700" : "#888";
  ctx.fillText("[FORMULAR: " + (STATE.hasForm ? "✓" : "—") + "]", SCREEN_W - 10, SCREEN_H - 4);
}

function drawDialogueBox() {
  const npc = (STATE.dialogue.npc === "honecker") ? HONEYCKER :
             (STATE.dialogue.npc === "_form" || STATE.dialogue.npc === "_ending") ? null :
             NPC[STATE.dialogue.npc];
  const name = npc ? npc.name : (STATE.dialogue.npc === "_form" ? "SYSTEM" : (STATE.dialogue.npc === "_ending" ? "SYSTEM" : "???"));
  const portColor = npc ? npc.color : "#FFD700";

  const boxH = 130;
  const boxY = SCREEN_H - boxH - 6;
  ctx.fillStyle = "rgba(0,0,0,0.94)";
  ctx.fillRect(0, boxY, SCREEN_W, boxH);
  ctx.strokeStyle = "#00FF41";
  ctx.lineWidth = 2;
  ctx.strokeRect(1, boxY + 1, SCREEN_W - 2, boxH - 2);
  ctx.lineWidth = 1;
  // portrait
  const portX = 14, portY = boxY + 10, portS = 64;
  ctx.fillStyle = "rgba(20,30,40,0.7)";
  ctx.fillRect(portX-2, portY-2, portS+4, portS+4);
  if (npc) {
    const pc = npc.portrait();
    ctx.drawImage(pc, portX, portY, portS, portS);
  } else {
    // system event portrait (form pickup / ending)
    ctx.fillStyle = portColor;
    ctx.fillRect(portX, portY, portS, portS);
    ctx.fillStyle = "#000";
    ctx.font = "10px 'Press Start 2P', monospace";
    ctx.textAlign = "center";
    ctx.fillText("★", portX + portS/2, portY + 36);
  }
  // name + DDR roundel
  ctx.fillStyle = portColor;
  ctx.font = "10px 'Press Start 2P', monospace";
  ctx.textAlign = "left";
  ctx.fillText(name, portX + portS + 12, boxY + 22);
  // typewriter text
  ctx.fillStyle = "#00FF41";
  ctx.font = "11px 'Press Start 2P', monospace";
  wrapText(ctx, STATE.dialogue.full.slice(0, Math.floor(STATE.dialogue.typed)), portX + portS + 12, boxY + 42, SCREEN_W - portS - 30);
  // ▼ WEITER prompt
  if (STATE.dialogue.typed >= STATE.dialogue.full.length) {
    if (Math.floor(performance.now()/300) % 2 === 0) {
      ctx.fillStyle = "#FFD700";
      ctx.font = "10px 'Press Start 2P', monospace";
      ctx.textAlign = "right";
      ctx.fillText("▼ WEITER  [E]", SCREEN_W - 16, boxY + boxH - 12);
    }
  }
}

function wrapText(c, text, x, y, maxWidth) {
  const words = text.split(" ");
  let line = "", curY = y;
  for (const w of words) {
    const test = line ? line + " " + w : w;
    if (c.measureText(test).width > maxWidth && line) {
      c.fillText(line, x, curY);
      line = w;
      curY += 14;
    } else {
      line = test;
    }
  }
  if (line) c.fillText(line, x, curY);
}

/* ---------- 15. TITLE / INTRO / ENDING SCREENS ------------------- */
const DDR_COAT = (() => {
  const canvas = makeOffscreen(120, 120);
  drawCtx(canvas, c => {
    // outer ring
    c.fillStyle = "#FFD700";
    c.beginPath(); c.arc(60, 60, 56, 0, Math.PI*2); c.fill();
    c.fillStyle = "#CC0000";
    c.beginPath(); c.arc(60, 60, 52, 0, Math.PI*2); c.fill();
    // hammer
    c.fillStyle = "#FFD700"; c.fillRect(20, 60, 30, 8);
    c.fillStyle = "#8B5C2A"; c.fillRect(44, 48, 8, 32);
    // compass
    c.fillStyle = "#FFD700";
    c.beginPath(); c.moveTo(70, 70); c.lineTo(95, 30); c.lineTo(80, 30); c.closePath(); c.fill();
    c.beginPath(); c.moveTo(70, 70); c.lineTo(105, 50); c.lineTo(105, 65); c.closePath(); c.fill();
    // centre star
    c.fillStyle = "#FFEC00";
    c.beginPath(); c.arc(75, 60, 6, 0, Math.PI*2); c.fill();
    // grain
    c.fillStyle = "rgba(255,235,0,0.25)";
    for (let i = 0; i < 200; i++) {
      c.fillRect(Math.random()*120, Math.random()*120, 1, 1);
    }
  });
  return canvas;
})();
function ctx_fillCircle(ctx, x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
}

function renderTitle() {
  // dark background
  ctx.fillStyle = "#0a0a14";
  ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
  // starfield
  for (let i = 0; i < 60; i++) {
    const sx = (i*97 + performance.now()*0.005) % SCREEN_W;
    const sy = (i*53 + performance.now()*0.007) % SCREEN_H;
    const bright = (i % 5 === 0) ? "#FFD700" : ((i % 3 === 0) ? "#FFEC00" : "#FFF");
    ctx.fillStyle = bright; ctx.fillRect(sx, sy, 1, 1);
  }
  // moon ground silhouette at bottom
  ctx.fillStyle = "#1a1a24";
  ctx.beginPath(); ctx.moveTo(0, SCREEN_H); ctx.lineTo(0, SCREEN_H - 60);
  ctx.lineTo(120, SCREEN_H - 80); ctx.lineTo(280, SCREEN_H - 50);
  ctx.lineTo(420, SCREEN_H - 90); ctx.lineTo(620, SCREEN_H - 40);
  ctx.lineTo(800, SCREEN_H - 70); ctx.lineTo(800, SCREEN_H);
  ctx.closePath(); ctx.fill();
  // moon base silhouette - just a vague rectangle outline
  ctx.fillStyle = "#0a0a14";
  ctx.strokeStyle = "#FFD700"; ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const x = 200 + i*100, y = SCREEN_H - 120;
    ctx.fillRect(x, y, 60, 50);
    ctx.strokeRect(x + 0.5, y + 0.5, 60, 50);
    // antenna
    ctx.fillRect(x + 30, y - 12, 2, 14);
  }
  // DDR coat
  ctx.drawImage(DDR_COAT, 24, 24, 110, 110);
  // title
  ctx.font = "bold 30px 'Press Start 2P', monospace";
  ctx.textAlign = "center";
  // shadow
  ctx.fillStyle = "#000";
  ctx.fillText("MONDSTATION", SCREEN_W/2 + 2, 100 + 2);
  ctx.fillText("HONECKER",   SCREEN_W/2 + 2, 138 + 2);
  // main
  const titleHue = (Math.sin(performance.now()/300) > 0);
  ctx.fillStyle = titleHue ? "#FFD700" : "#FFEC00";
  ctx.fillText("MONDSTATION", SCREEN_W/2, 100);
  ctx.fillText("HONECKER",   SCREEN_W/2, 138);
  // subtitle
  ctx.fillStyle = "#FFF";
  ctx.font = "10px 'Press Start 2P', monospace";
  ctx.fillText("Ein Weltraumabenteuer der Deutschen Demokratischen Republik", SCREEN_W/2, 178);
  // small rotating motif - moonwalking silhouette
  const t = performance.now() / 300;
  const mx = SCREEN_W/2 + Math.sin(t*2) * 80;
  const my = 250 + Math.sin(t*4) * 4;
  ctx.save(); ctx.translate(mx, my);
  ctx.fillStyle = "#FF69B4"; ctx.fillRect(-12, -16, 24, 12);
  ctx.fillStyle = "#FF1493"; ctx.fillRect(-10, -4, 20, 14);
  ctx.fillStyle = "#FFF"; ctx.fillRect(-8, 4, 6, 6); ctx.fillRect(2, 4, 6, 6);
  ctx.restore();
  // mullet hint
  ctx.fillStyle = "#FFD700";
  ctx.font = "8px 'Press Start 2P', monospace";
  ctx.textAlign = "center";
  ctx.fillText("8 Tentakel. 4 Wände. 340 Lichtjahre Lederhosen.", SCREEN_W/2, 312);
  ctx.fillText("(und eine kaputte Kaffeemaschine)", SCREEN_W/2, 324);
  // prompt
  const blink = Math.floor(performance.now()/500) % 2;
  if (blink) {
    ctx.fillStyle = "#FFD700";
    ctx.font = "12px 'Press Start 2P', monospace";
    ctx.fillText("DRÜCKE BELIEBIGE TASTE — ODER KLICKE", SCREEN_W/2, SCREEN_H - 90);
  }
  // fine-print disclaimer
  ctx.fillStyle = "#888";
  ctx.font = "7px 'Press Start 2P', monospace";
  ctx.fillText("Alle Charaktere sind fiktiv. Besonders die, die Sie erkennen.", SCREEN_W/2, SCREEN_H - 40);
  ctx.fillText("Und die mit den Mullets.", SCREEN_W/2, SCREEN_H - 28);
  // highlight ring around coat
  ctx.strokeStyle = "#FFD700";
  ctx.beginPath(); ctx.arc(80, 80, 64, 0, Math.PI*2); ctx.stroke();
}

function renderIntro() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
  // crawl UP (Star Wars style): text starts below the screen and scrolls up
  const offset = STATE.introTimer * 60;  // 60 px/sec
  ctx.font = "11px 'Press Start 2P', monospace";
  ctx.fillStyle = "#FFEC00";
  ctx.textAlign = "center";
  const lines = STATE.introLines;
  for (let i = 0; i < lines.length; i++) {
    // line 0 (first/lead line) starts just below the screen and rises;
    // subsequent lines stack below it in the same column
    ctx.fillText(lines[i], SCREEN_W/2, SCREEN_H + 30 - i*22 - offset);
  }
  // title overlay
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(0, 0, SCREEN_W, 50);
  ctx.fillStyle = "#FFD700";
  ctx.font = "14px 'Press Start 2P', monospace";
  ctx.textAlign = "center";
  ctx.fillText("MONDSTATION HONECKER", SCREEN_W/2, 24);
  // skip hint after some frames
  if (STATE.introTimer > 1) {
    ctx.fillStyle = "#888";
    ctx.font = "8px 'Press Start 2P', monospace";
    ctx.fillText("[LEERTASTE] ÜBERSPRINGEN", SCREEN_W/2, SCREEN_H - 12);
  }
  // advance crawl (faster, frame-rate independent)
  STATE.introTimer += 1/30;
  if (offset > SCREEN_H + 100) {
    STATE.introDone = true;
  }
}

function renderEnding() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
  // starfield (slow drift)
  for (let i = 0; i < 80; i++) {
    const sx = (i*97 + performance.now()*0.002) % SCREEN_W;
    const sy = (i*53) % SCREEN_H;
    ctx.fillStyle = i % 6 === 0 ? "#FFD700" : "#FFF";
    ctx.fillRect(sx, sy, 1, 1);
  }
  // earth silhouette
  ctx.fillStyle = "#1a3a8e";
  ctx.beginPath(); ctx.arc(660, 100, 64, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#0a2860";
  ctx.beginPath(); ctx.arc(640, 84, 14, 0, Math.PI*2); ctx.fill(); // green
  ctx.beginPath(); ctx.arc(686, 110, 18, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#88ddff";
  ctx.beginPath(); ctx.arc(660, 80, 64, Math.PI*1.3, Math.PI*1.7); ctx.fill();
  // moon ground silhouette
  ctx.fillStyle = "#3a3a4a";
  ctx.fillRect(0, SCREEN_H - 80, SCREEN_W, 80);
  // two silhouettes (Dimitry + Manfred) sitting
  ctx.fillStyle = "#fff";
  ctx.fillRect(200, SCREEN_H - 100, 16, 28);
  ctx.fillRect(204, SCREEN_H - 124, 12, 12);
  ctx.fillStyle = "#6688cc";
  ctx.fillRect(280, SCREEN_H - 100, 18, 28);
  ctx.fillRect(284, SCREEN_H - 124, 14, 12);
  // ending text crawl
  ctx.font = "11px 'Press Start 2P', monospace";
  ctx.fillStyle = "#FFEC00";
  ctx.textAlign = "center";
  const lines = [
    "",
    "ENDING A: DIMITRY GEHT NACH HAUSE",
    "",
    "Dimitry hat das Formular.",
    "Er liest es. Er weint.",
    "Brigitte stempelt es: APPROVED.",
    "Er geht. Die Rakete springt an.",
    "Die Rakete stoppt.",
    "Er sitzt auf dem Mond.",
    "Manfred kommt und setzt sich dazu.",
    "Sie schauen auf die Erde.",
    "",
    "Dimitry ging nie nach Hause.",
    "Aber er hörte auf, darauf zu warten.",
    "Das war, in gewisser Weise, genug.",
    "",
    "[SPACE] ZURÜCK ZUM TITEL",
  ];
  const t = STATE.endingTimer;
  const offset = t * 16;
  for (let i = 0; i < lines.length; i++) {
    const y = SCREEN_H*0.6 - i*22 + offset;
    if (y > 0 && y < SCREEN_H) ctx.fillText(lines[i], SCREEN_W/2, y);
  }
  STATE.endingTimer += 1/60;
}

/* ---------- 16. INPUT LOOP ------------------------------------- */
let lastInteract = 0;
function pollInteract() {
  if (keys["e"] || keys[" "]) {
    if (performance.now() - lastInteract > 200) {
      lastInteract = performance.now();
      interactKeyPressed();
    }
  }
}

/* ---------- 17. MAIN LOOP --------------------------------------- */
let lastFrame = performance.now();
function loop(now) {
  const dt = Math.min(0.1, (now - lastFrame) / 1000);
  lastFrame = now;
  // input polling
  update(dt);
  pollInteract();
  // render
  renderFrame();
  requestAnimationFrame(loop);
}

/* Periodically play ambient for game screen */
let ambientCooldown = 0;
function maybeAmbient(dt) {
  if (!STATE.gameStarted) return;
  if (STATE.screen !== "game") return;
  ambientCooldown -= dt;
  if (ambientCooldown <= 0) {
    ambientCooldown = 6;
    beep(80 + Math.random()*40, 0.8, "triangle", 0.012);
  }
}

/* ---------- 18. SAVE / STARTUP ------------------------------- */
// Try to unlock audio on first interaction
addEventListener("keydown", () => ensureAudio(), { once:false });

/* ---------- 19. BOOT ------------------------------------------- */
(function boot() {
  STATE.introTimer = 0;
  STATE.introDone = false;
  renderTitle();
  requestAnimationFrame(loop);
})();

</script>
